name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # The trust gate for contributed content: boots the real DuckDB-Wasm engine
      # and executes + self-grades every question. Broken SQL fails the build.
      - run: pnpm verify:content
      # dbt challenges: build each reference solution on the real engine + self-grade.
      - run: pnpm verify:dbt
      - run: pnpm build
